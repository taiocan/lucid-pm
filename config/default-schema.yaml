# LucidPM default project vocabulary
# Installed to: ~/.lucidpm/default-schema.yaml
schemaVersion: 1

properties:
  status:
    type: enum
  priority:
    type: enum
    values:
      - low
      - medium
      - high
  deadline:
    type: date
  scheduled:
    type: date

statuses:
  # task statuses
  todo:
  doing:
  done:
  waiting:
  cancelled:
  # milestone statuses
  pending:
  achieved:
  missed:
  # risk statuses
  open:
  mitigated:
  accepted:
  closed:
  # issue statuses
  in_progress:
  resolved:
  # stakeholder statuses
  active:
  inactive:

pageTypes:
  Stakeholder:
    uses:
      - status
    allowedStatuses:
      - active
      - inactive
    aliases:
      - stakeholder
  Milestone:
    uses:
      - status
      - deadline
    allowedStatuses:
      - pending
      - achieved
      - missed
    aliases:
      - milestone
  WorkPackage:
    uses:
      - status
      - priority
      - deadline
    aliases:
      - workpackage
  # Task as a top-level page type for backward compatibility with existing event logs.
  # Pre-F12, pm_structuring extracts "task" items as top-level project record entries.
  # F12 (task_model) will redefine Task as an embedded block type.
  Task:
    uses:
      - status
    allowedStatuses:
      - todo
      - doing
      - done
      - waiting
      - cancelled
    aliases:
      - task
  Issue:
    uses:
      - status
      - deadline
    allowedStatuses:
      - open
      - in_progress
      - resolved
      - closed
    aliases:
      - issue
  Risk:
    uses:
      - status
      - deadline
    allowedStatuses:
      - open
      - mitigated
      - accepted
      - closed
    aliases:
      - risk

# blockTypes (Task as embedded block) deferred to F12 (task_model).
# No task instances are persisted in the event log until F12.

relations:
  assignedTo:
    source:
      - WorkPackage
      - Task
      - Issue
    target:
      - Stakeholder
  blocks:
    source:
      - WorkPackage
      - Task
      - Issue
    target:
      - WorkPackage
      - Task
      - Milestone
  affects:
    source:
      - Risk
      - Issue
    target:
      - WorkPackage
      - Task
      - Milestone
      - Stakeholder
  relatedTo:
    source:
      - any
    target:
      - any

renderers:
  logseq:
    relations:
      assignedTo:
        forwardLabel: "Assigned To"
        inverseLabel: "Owns"
      blocks:
        forwardLabel: "Blocks"
        inverseLabel: "Blocked By"
      affects:
        forwardLabel: "Affects"
        inverseLabel: "Affected By"
      relatedTo:
        forwardLabel: "Related To"
        inverseLabel: "Related To"
    properties:
      deadline: deadline
      scheduled: scheduled
      status: status
      priority: priority
